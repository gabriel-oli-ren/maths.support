<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
  </style>
</head>
<body>
<script>
  var DEST   = 'https://canvas.inspirededucationschools.com';
  var TARGET = 'maths.html';
  var TITLE  = 'Maths Support';
  var FAVICON = 'maths-logo.png';

  var win = null;
  try { win = window.open('', '_blank'); } catch(e) {}

  if (!win || win.closed) {
    window.location.replace(TARGET);
  } else {
    try {
      var d = win.document;
      d.open();
      d.write(
        '<!DOCTYPE html><html>' +
        '<head>' +
        '<meta charset="UTF-8">' +
        '<title>' + TITLE + '</title>' +
        '<link rel="icon" type="image/png" href="' + FAVICON + '">' +
        '<link rel="shortcut icon" type="image/png" href="' + FAVICON + '">' +
        '<style>' +
          '*{margin:0;padding:0}' +
          'html,body{width:100%;height:100%;overflow:hidden;background:#000}' +
          'iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:0}' +
        '</style>' +
        '</head>' +
        '<body>' +
        '<iframe src="' + TARGET + '"' +
        ' allow="fullscreen *; autoplay *; clipboard-read *; clipboard-write *"' +
        ' allowfullscreen' +
        ' sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation allow-modals allow-pointer-lock allow-downloads">' +
        '</iframe>' +
        '</body></html>'
      );
      d.close();

      // Set title + favicon via the new window's DOM directly as well,
      // in case document.write title gets overridden by the iframe
      try {
        win.document.title = TITLE;
        var link = win.document.querySelector("link[rel*='icon']");
        if (link) { link.href = FAVICON; }
      } catch(e) {}

      try { win.history.replaceState(null, '', 'about:blank'); } catch(e) {}

    } catch(e) {
      try { win.location.replace(TARGET); } catch(e2) {}
    }

    try { window.location.replace(DEST); } catch(e) {
      window.location.href = DEST;
    }
  }
</script>
</body>
</html>
