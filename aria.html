<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ARIA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#07070d;
  --s1:#0f0f18;
  --s2:#16161f;
  --s3:#1e1e2a;
  --border:#252535;
  --a:#6f5ff6;
  --text:#eceaf8;
  --dim:#9490aa;
  --green:#3ddc84;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  height:100vh;
  overflow:hidden;
  display:flex;
}

.sidebar{
  width:260px;
  border-right:1px solid var(--border);
  background:#0b0b12;
  display:flex;
  flex-direction:column;
  transition:.3s;
}

.sidebar.hidden{
  width:0;
  overflow:hidden;
}

.sidebar-top{
  padding:18px;
  border-bottom:1px solid var(--border);
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne', sans-serif;
  font-weight:800;
}

.logo-info h1{
  font-size:15px;
  font-family:'Syne', sans-serif;
}

.status{
  font-size:10px;
  color:var(--green);
}

.new-chat{
  width:100%;
  border:none;
  padding:12px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  color:white;
  cursor:pointer;
  font-family:'DM Mono', monospace;
}

.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat-item{
  padding:15px 18px;
  border-bottom:1px solid rgba(255,255,255,.03);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-item:hover{
  background:rgba(111,95,246,.08);
}

.chat-item.active{
  background:rgba(111,95,246,.14);
}

.delete-btn{
  background:none;
  border:none;
  color:#ff6b6b;
  cursor:pointer;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  height:72px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
}

header h2{
  font-family:'Syne', sans-serif;
  font-size:16px;
}

header p{
  color:var(--dim);
  font-size:11px;
}

.top-actions{
  display:flex;
  gap:10px;
}

.top-btn{
  border:none;
  background:var(--s2);
  color:white;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.welcome{
  margin:auto;
  text-align:center;
}

.welcome-icon{
  width:80px;
  height:80px;
  border-radius:24px;
  margin:0 auto 24px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

.welcome h1{
  font-size:34px;
  font-family:'Syne', sans-serif;
}

.welcome p{
  color:var(--dim);
  margin-top:10px;
}

.msg{
  display:flex;
  gap:12px;
  max-width:900px;
}

.msg.user{
  margin-left:auto;
  flex-direction:row-reverse;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.user .avatar{
  background:#ff7b5b;
}

.ai .avatar{
  background:var(--a);
}

.bubble{
  background:var(--s1);
  border:1px solid var(--border);
  padding:15px 18px;
  border-radius:18px;
  line-height:1.8;
  font-size:13px;
}

.user .bubble{
  background:var(--s3);
}

.input-wrap{
  padding:20px;
  border-top:1px solid var(--border);
}

.input-box{
  display:flex;
  gap:12px;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:none;
  color:white;
  font-family:'DM Mono', monospace;
  font-size:13px;
}

.send{
  width:42px;
  height:42px;
  border:none;
  border-radius:13px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  color:white;
  cursor:pointer;
}

.typing{
  display:flex;
  gap:5px;
}

.typing span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--a);
  animation:bounce 1s infinite;
}

.typing span:nth-child(2){
  animation-delay:.15s;
}

.typing span:nth-child(3){
  animation-delay:.3s;
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0);
    opacity:.4;
  }
  50%{
    transform:translateY(-5px);
    opacity:1;
  }
}

</style>
</head>
<body>

<div class="sidebar" id="sidebar">

  <div class="sidebar-top">

    <div class="logo-wrap">
      <div class="logo">AR</div>

      <div class="logo-info">
        <h1>ARIA AI</h1>
        <div class="status">● ONLINE</div>
      </div>
    </div>

    <button class="new-chat" onclick="newChat()">
      + New Chat
    </button>

  </div>

  <div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<header>

<div>
  <h2>ARIA Assistant</h2>
  <p>Streaming AI assistant</p>
</div>

<div class="top-actions">
  <button class="top-btn" onclick="toggleSidebar()">
    Hide
  </button>
</div>

</header>

<div class="chat" id="chat">

<div class="welcome">
  <div class="welcome-icon">✦</div>
  <h1>Hello, I'm ARIA</h1>
  <p>Streaming AI assistant with Supabase saving.</p>
</div>

</div>

<div class="input-wrap">

<div class="input-box">

<textarea
id="input"
rows="1"
placeholder="Message ARIA..."
></textarea>

<button class="send" id="sendBtn">
➤
</button>

</div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://hsmfjpetvcsgkpkwpdjr.supabase.co";

const SUPABASE_KEY =
"YOUR_SUPABASE_KEY";

const supabase =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const API_KEY = "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";

const MODEL = "google/gemma-3-27b-it:free";

const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");

let chats = [];
let currentChat = null;

async function loadChats(){

  const {data} =
    await supabase
      .from("chats")
      .select("*")
      .order("id",{ascending:false});

  chats = data || [];

  if(chats.length){
    currentChat = chats[0];
  }

  renderChats();
  renderMessages();
}

async function saveChat(chat){

  if(chat.id){

    await supabase
      .from("chats")
      .update({
        title:chat.title,
        messages:chat.messages
      })
      .eq("id",chat.id);

  }else{

    const {data} =
      await supabase
        .from("chats")
        .insert({
          title:chat.title,
          messages:chat.messages
        })
        .select()
        .single();

    chat.id = data.id;
  }
}

function toggleSidebar(){
  document
    .getElementById("sidebar")
    .classList.toggle("hidden");
}

async function deleteChat(id){

  await supabase
    .from("chats")
    .delete()
    .eq("id",id);

  chats = chats.filter(c => c.id !== id);

  currentChat = chats[0] || null;

  renderChats();
  renderMessages();
}

function newChat(){

  currentChat = {
    title:"New Chat",
    messages:[]
  };

  chats.unshift(currentChat);

  renderChats();
  renderMessages();
}

function renderChats(){

  chatList.innerHTML = "";

  chats.forEach(chat => {

    const div = document.createElement("div");

    div.className =
      "chat-item" +
      (currentChat === chat
      ? " active"
      : "");

    div.innerHTML = `
      <span>${chat.title}</span>

      <button
        class="delete-btn"
        onclick="event.stopPropagation(); deleteChat(${chat.id})"
      >
        ✕
      </button>
    `;

    div.onclick = () => {
      currentChat = chat;
      renderChats();
      renderMessages();
    };

    chatList.appendChild(div);

  });
}

function renderMessages(){

  chatEl.innerHTML = "";

  if(!currentChat || !currentChat.messages.length){

    chatEl.innerHTML = `
      <div class="welcome">
        <div class="welcome-icon">✦</div>
        <h1>Hello, I'm ARIA</h1>
      </div>
    `;

    return;
  }

  currentChat.messages.forEach(msg => {

    const div = document.createElement("div");

    div.className =
      "msg " +
      (msg.role === "user"
      ? "user"
      : "ai");

    div.innerHTML = `
      <div class="avatar">
        ${msg.role === "user" ? "U" : "✦"}
      </div>

      <div class="bubble">
        ${msg.content}
      </div>
    `;

    chatEl.appendChild(div);

  });

  scrollBottom();
}

async function sendMessage(){

  const text = input.value.trim();

  if(!text) return;

  currentChat.messages.push({
    role:"user",
    content:text
  });

  if(currentChat.title === "New Chat"){
    currentChat.title = text.slice(0,25);
  }

  renderMessages();
  renderChats();

  input.value = "";

  await saveChat(currentChat);

  const typing = document.createElement("div");

  typing.className = "msg ai";

  typing.innerHTML = `
    <div class="avatar">✦</div>

    <div class="bubble">
      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;

  chatEl.appendChild(typing);

  scrollBottom();

  try{

    const response = await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        method:"POST",

        headers:{
          "Authorization":"Bearer " + API_KEY,
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          model:MODEL,
          messages:currentChat.messages
        })
      }
    );

    const data = await response.json();

    typing.remove();

    const reply =
      data.choices?.[0]?.message?.content
      || "Error";

    currentChat.messages.push({
      role:"assistant",
      content:reply
    });

    await saveChat(currentChat);

    renderMessages();

  }catch(err){

    console.error(err);

  }
}

function scrollBottom(){
  chatEl.scrollTop =
    chatEl.scrollHeight;
}

input.addEventListener("keydown", e => {

  if(e.key === "Enter" && !e.shiftKey){

    e.preventDefault();

    sendMessage();
  }
});

sendBtn.onclick = sendMessage;

loadChats();

</script>

</body>
</html>
