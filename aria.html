<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07070d;
  --s1:#0f0f18;
  --s2:#16161f;
  --s3:#1e1e2a;
  --border:#252535;
  --a:#6f5ff6;
  --text:#eceaf8;
  --dim:#9490aa;
  --green:#3ddc84;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  height:100vh;
  overflow:hidden;
  display:flex;
}

.sidebar{
  width:260px;
  border-right:1px solid var(--border);
  background:rgba(10,10,16,.96);
  display:flex;
  flex-direction:column;
}

.sidebar-top{
  padding:18px;
  border-bottom:1px solid var(--border);
}

.logo-wrap{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:16px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne', sans-serif;
  font-weight:800;
  box-shadow:0 0 40px rgba(111,95,246,.35);
}

.logo-info h1{
  font-size:15px;
  font-family:'Syne', sans-serif;
}

.status{
  font-size:10px;
  color:var(--green);
  margin-top:3px;
}

.new-chat{
  width:100%;
  border:none;
  border-radius:14px;
  padding:12px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  color:white;
  cursor:pointer;
  font-family:'DM Mono', monospace;
}

.chat-list{
  overflow-y:auto;
  flex:1;
}

.chat-item{
  padding:15px 18px;
  border-bottom:1px solid rgba(255,255,255,.03);
  cursor:pointer;
  transition:.2s;
}

.chat-item:hover{
  background:rgba(111,95,246,.08);
}

.chat-item.active{
  background:rgba(111,95,246,.14);
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  height:72px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}

header h2{
  font-family:'Syne', sans-serif;
  font-size:16px;
}

header p{
  color:var(--dim);
  font-size:11px;
  margin-top:3px;
}

.model{
  border:1px solid var(--border);
  background:var(--s2);
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  color:var(--dim);
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.welcome{
  margin:auto;
  text-align:center;
  max-width:600px;
}

.welcome-icon{
  width:80px;
  height:80px;
  margin:0 auto 24px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--a),#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  box-shadow:0 0 70px rgba(111,95,246,.35);
}

.welcome h1{
  font-size:34px;
  font-family:'Syne', sans-serif;
  margin-bottom:10px;
}

.welcome p{
  color:var(--dim);
  line-height:1.8;
  font-size:13px;
}

.msg{
  display:flex;
  gap:12px;
  max-width:900px;
}

.msg.user{
  margin-left:auto;
  flex-direction:row-reverse;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.user .avatar{
  background:linear-gradient(135deg,#ff7b5b,#ff9f43);
}

.ai .avatar{
  background:linear-gradient(135deg,var(--a),#a855f7);
}

.bubble{
  background:var(--s1);
  border:1px solid var(--border);
  padding:15px 18px;
  border-radius:18px;
  line-height:1.8;
  font-size:13px;
  overflow:hidden;
  word-break:break-word;
}

.user .bubble{
  background:var(--s3);
}

.bubble pre{
  background:black;
  padding:12px;
  border-radius:12px;
  overflow:auto;
  margin:10px 0;
}

.bubble code{
  font-family:'DM Mono', monospace;
}

.input-wrap{
  padding:20px;
  border-top:1px solid var(--border);
}

.input-box{
  display:flex;
  align-items:flex-end;
  gap:12px;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  background:none;
  outline:none;
  color:white;
  font-family:'DM Mono', monospace;
  font-size:13px;
  max-height:180px;
}

.actions{
  display:flex;
  gap:8px;
}

.btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:13px;
  background:var(--s1);
  color:var(--dim);
  cursor:pointer;
}

.send{
  background:linear-gradient(135deg,var(--a),#a855f7);
  color:white;
}

.typing{
  display:flex;
  gap:5px;
}

.typing span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--a);
  animation:bounce 1s infinite;
}

.typing span:nth-child(2){
  animation-delay:.15s;
}

.typing span:nth-child(3){
  animation-delay:.3s;
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0);
    opacity:.4;
  }
  50%{
    transform:translateY(-5px);
    opacity:1;
  }
}

@media(max-width:900px){
  .sidebar{
    display:none;
  }
}

</style>
</head>
<body>

<div class="sidebar">

  <div class="sidebar-top">

    <div class="logo-wrap">
      <div class="logo">AR</div>

      <div class="logo-info">
        <h1>ARIA AI</h1>
        <div class="status">● ONLINE</div>
      </div>
    </div>

    <button class="new-chat" onclick="newChat()">
      + New Chat
    </button>

  </div>

  <div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<header>

  <div>
    <h2>ARIA Assistant</h2>
    <p>Realtime streaming AI</p>
  </div>

  <div class="model">
    gemma-3-27b-it
  </div>

</header>

<div class="chat" id="chat">

  <div class="welcome">
    <div class="welcome-icon">✦</div>

    <h1>Hello, I'm ARIA</h1>

    <p>
      Streaming AI assistant with local chat saving.
    </p>
  </div>

</div>

<div class="input-wrap">

  <div class="input-box">

    <textarea
      id="input"
      rows="1"
      placeholder="Message ARIA..."
    ></textarea>

    <div class="actions">

      <button class="btn send" id="sendBtn">
        ➤
      </button>

    </div>

  </div>

</div>

</div>

<script>

const API_KEY = "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";

const MODEL = "google/gemma-3-27b-it:free";

const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");

let chats =
  JSON.parse(localStorage.getItem("aria_chats") || "[]");

let currentChat = null;

function saveChats(){
  localStorage.setItem(
    "aria_chats",
    JSON.stringify(chats)
  );
}

function newChat(){

  const chat = {
    id:Date.now(),
    title:"New Chat",
    messages:[]
  };

  chats.unshift(chat);

  currentChat = chat;

  saveChats();

  renderChats();

  renderMessages();
}

function renderChats(){

  chatList.innerHTML = "";

  chats.forEach(chat => {

    const div = document.createElement("div");

    div.className =
      "chat-item" +
      (currentChat?.id === chat.id
      ? " active"
      : "");

    div.innerHTML = chat.title;

    div.onclick = () => {

      currentChat = chat;

      renderChats();

      renderMessages();
    };

    chatList.appendChild(div);
  });
}

function renderMessages(){

  chatEl.innerHTML = "";

  if(!currentChat.messages.length){

    chatEl.innerHTML = `
      <div class="welcome">

        <div class="welcome-icon">✦</div>

        <h1>Hello, I'm ARIA</h1>

        <p>
          Streaming AI assistant with local chat saving.
        </p>

      </div>
    `;

    return;
  }

  currentChat.messages.forEach(msg => {

    if(msg.role === "user"){
      addUserMessage(msg.content);
    }else{
      addAIMessage(msg.content);
    }

  });
}

function addUserMessage(text){

  const div = document.createElement("div");

  div.className = "msg user";

  div.innerHTML = `
    <div class="avatar">U</div>

    <div class="bubble">
      ${escapeHtml(text).replace(/\n/g,"<br>")}
    </div>
  `;

  chatEl.appendChild(div);

  scrollBottom();
}

function addAIMessage(text){

  const div = document.createElement("div");

  div.className = "msg ai";

  div.innerHTML = `
    <div class="avatar">✦</div>

    <div class="bubble">
      ${renderMarkdown(text)}
    </div>
  `;

  chatEl.appendChild(div);

  scrollBottom();
}

function createStreamingBubble(){

  const div = document.createElement("div");

  div.className = "msg ai";

  div.innerHTML = `
    <div class="avatar">✦</div>

    <div class="bubble">

      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  `;

  chatEl.appendChild(div);

  scrollBottom();

  return div.querySelector(".bubble");
}

async function sendMessage(){

  const text = input.value.trim();

  if(!text) return;

  addUserMessage(text);

  currentChat.messages.push({
    role:"user",
    content:text
  });

  if(currentChat.messages.length === 1){
    currentChat.title = text.slice(0,25);
  }

  renderChats();

  saveChats();

  input.value = "";

  const bubble = createStreamingBubble();

  try{

    const response = await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        method:"POST",

        headers:{
          "Authorization":`Bearer ${API_KEY}`,
          "Content-Type":"application/json",
          "HTTP-Referer":"http://localhost:3000",
          "X-Title":"ARIA AI"
        },

        body:JSON.stringify({

          model:MODEL,

          stream:true,

          messages:[
            {
              role:"system",
              content:"You are ARIA, a futuristic AI assistant."
            },

            ...currentChat.messages
          ]
        })
      }
    );

    if(!response.ok){

      const err = await response.text();

      bubble.innerHTML =
        `<span style="color:red">${err}</span>`;

      console.error(err);

      return;
    }

    bubble.innerHTML = "";

    const reader =
      response.body.getReader();

    const decoder =
      new TextDecoder();

    let finalText = "";

    while(true){

      const {done, value} =
        await reader.read();

      if(done) break;

      const chunk =
        decoder.decode(value);

      const lines =
        chunk.split("\n");

      for(const line of lines){

        if(!line.startsWith("data:")) continue;

        const data =
          line.replace("data: ","");

        if(data === "[DONE]") continue;

        try{

          const json =
            JSON.parse(data);

          const token =
            json.choices?.[0]?.delta?.content;

          if(token){

            finalText += token;

            bubble.innerHTML =
              renderMarkdown(finalText);

            scrollBottom();
          }

        }catch{}
      }
    }

    currentChat.messages.push({
      role:"assistant",
      content:finalText
    });

    saveChats();

  }catch(err){

    bubble.innerHTML =
      `<span style="color:red">${err.message}</span>`;

    console.error(err);
  }
}

function scrollBottom(){

  requestAnimationFrame(() => {
    chatEl.scrollTop =
      chatEl.scrollHeight;
  });
}

function renderMarkdown(text){

  text = escapeHtml(text);

  text = text.replace(
    /```([\s\S]*?)```/g,
    "<pre><code>$1</code></pre>"
  );

  text = text.replace(
    /`([^`]+)`/g,
    "<code>$1</code>"
  );

  text = text.replace(
    /\*\*(.*?)\*\*/g,
    "<strong>$1</strong>"
  );

  text = text.replace(
    /\n/g,
    "<br>"
  );

  return text;
}

function escapeHtml(text){

  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

input.addEventListener("keydown", e => {

  if(e.key === "Enter" && !e.shiftKey){

    e.preventDefault();

    sendMessage();
  }
});

sendBtn.onclick = sendMessage;

newChat();

</script>

</body>
</html>
