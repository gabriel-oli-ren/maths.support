<div id="host"></div>
<script>
  // Create a Shadow Root that is 'closed' to outside scripts/extensions
  const host = document.querySelector('#host');
  const shadow = host.attachShadow({mode: 'closed'});

  shadow.innerHTML = `
    <div style="position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
                z-index: 2147483647 !important; background: white !important;">
      <iframe src="https://openfront.io" 
              style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
  `;
</script>
