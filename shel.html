<div id="wrapper"></div>

<script>
  // This script creates a 'Shadow Root' which is harder for extensions to 'see' and block
  const host = document.querySelector('#wrapper');
  const shadow = host.attachShadow({mode: 'closed'}); // 'closed' makes it even harder to access
  
  shadow.innerHTML = `
    <div style="position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2147483647 !important; background: white;">
      <iframe src="https://openfront.io" 
              style="width: 100%; height: 100%; border: none;">
      </iframe>
    </div>
  `;
</script>
