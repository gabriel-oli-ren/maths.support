<div id="ui-wrapper" style="position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2147483647 !important; background: white;">
  <iframe id="protected-frame" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<script>
  (async function() {
    const targetUrl = 'https://openfront.io/';
    const frame = document.getElementById('protected-frame');

    try {
      // 1. Attempt to fetch the site content
      const response = await fetch(targetUrl);
      const html = await response.text();

      // 2. Create a Blob (Binary Large Object) from the HTML string
      const blob = new Blob([html], { type: 'text/html' });
      
      // 3. Generate a temporary local URL for that Blob
      const blobUrl = URL.createObjectURL(blob);

      // 4. Set the iframe source to the local Blob URL
      frame.src = blobUrl;
    } catch (err) {
      // If the fetch fails (likely blocked by IMTLazarus), the frame stays empty
      console.error("Content blocked at network level.");
    }
  })();
</script>
