<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths Unblocker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    .tag {
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus {
      border-color: var(--accent);
    }
    input[type="url"]::placeholder { color: var(--muted); }

    button.go {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      white-space: nowrap;
    }
    button.go:hover { background: #d4ff1a; transform: scale(1.03); }
    button.go:active { transform: scale(0.97); }

    .quicklinks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .ql-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.5rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-align: center;
    }
    .ql-btn:hover { border-color: var(--accent); color: var(--accent); }

    .notice {
      background: rgba(255,107,53,0.08);
      border: 1px solid rgba(255,107,53,0.25);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      font-size: 0.7rem;
      color: #aaa;
      line-height: 1.6;
    }
    .notice strong { color: var(--accent2); }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    #status {
      font-size: 0.7rem;
      color: var(--accent2);
      margin-top: 0.5rem;
      min-height: 1em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="tag">payment request api</div>
  <h1>Maths<br><span>Unblocker</span></h1>
  <p class="subtitle">opens sites in a payment window · bypasses extension filters</p>

  <div class="card">
    <label>Enter URL</label>
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com" />
      <button class="go" onclick="openSite()">OPEN</button>
    </div>
    <div class="quicklinks">
      <button class="ql-btn" onclick="quick('https://www.khanacademy.org')">Khan Academy</button>
      <button class="ql-btn" onclick="quick('https://www.desmos.com/calculator')">Desmos</button>
      <button class="ql-btn" onclick="quick('https://www.wolframalpha.com')">Wolfram</button>
      <button class="ql-btn" onclick="quick('https://www.youtube.com')">YouTube</button>
      <button class="ql-btn" onclick="quick('https://www.google.com')">Google</button>
      <button class="ql-btn" onclick="quick('https://www.mathway.com')">Mathway</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="notice">
    <strong>heads up —</strong> window lasts ~3 min · cookies are saved · history is not ·
    won't bypass <em>network</em>-level filters · right-click to go back/forward
  </div>

  <div class="footer">MATHS UNBLOCKER · POWERED BY BUYPASS · NOT FOR MISUSE</div>
</div>

<script>
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function launch(url) {
    if (!url || !url.startsWith('http')) {
      setStatus('⚠ enter a valid url starting with https://');
      return;
    }
    setStatus('opening...');
    try {
      new PaymentRequest(
        [{
          supportedMethods: location.origin + "/pay/main.json",
          data: { url: url }
        }],
        {
          total: {
            label: "_",
            amount: { value: "1", currency: "USD" }
          }
        }
      ).show().catch(e => {
        // fallback: try without data (loads default)
        setStatus('⚠ ' + (e.message || 'blocked or unsupported'));
      });
      setTimeout(() => setStatus(''), 3000);
    } catch(e) {
      setStatus('⚠ PaymentRequest not supported in this browser');
    }
  }

  function openSite() {
    const val = document.getElementById('urlInput').value.trim();
    launch(val);
  }

  function quick(url) {
    document.getElementById('urlInput').value = url;
    launch(url);
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') openSite();
  });
</script>
</body>
</html>
