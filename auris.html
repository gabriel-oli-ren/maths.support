
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Auris Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06040f}
:root{
  --accent:#a78bfa;
  --accent-dim:rgba(167,139,250,0.15);
  --accent-border:rgba(167,139,250,0.35);
  --glass:rgba(255,255,255,0.05);
  --glass-b:rgba(255,255,255,0.09);
  --glass-hover:rgba(255,255,255,0.09);
  --text:#ede9f6;
  --muted:rgba(237,233,246,0.45);
  --surface:#06040f;
  --sidebar-w:290px;
  --fav:#f472b6;
}
body{font-family:'DM Sans',sans-serif;color:var(--text);position:relative}
.orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(124,58,237,0.13);top:-160px;left:-120px;filter:blur(90px)}
.o2{width:380px;height:380px;background:rgba(59,130,246,0.09);bottom:-100px;right:-80px;filter:blur(80px)}
.o3{width:260px;height:260px;background:rgba(236,72,153,0.08);top:45%;left:42%;filter:blur(70px)}
.layout{position:relative;z-index:1;display:flex;width:100vw;height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:rgba(6,4,15,0.75);border-right:0.5px solid var(--glass-b);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.logo{padding:22px 18px 14px;font-size:12px;font-weight:500;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo-mark{color:var(--accent);font-size:18px}
.logo-name{color:var(--text)}
.search-row{padding:0 12px 10px;display:flex;gap:8px}
.sbox{flex:1;display:flex;align-items:center;gap:7px;background:var(--glass);border:0.5px solid var(--glass-b);border-radius:10px;padding:8px 11px}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%}
.sbox input::placeholder{color:var(--muted)}
.sbox i{color:var(--muted);font-size:15px;flex-shrink:0}
.mode-row{display:flex;gap:6px;padding:0 12px 12px}
.mtab{flex:1;padding:6px 0;border-radius:8px;border:0.5px solid var(--glass-b);background:transparent;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.mtab.on{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.section-label{padding:0 16px 7px;font-size:10.5px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.section-label .clr{cursor:pointer;font-size:10px;color:var(--muted);transition:color .2s;text-transform:none;letter-spacing:0}
.section-label .clr:hover{color:var(--text)}
.queue{flex:1;overflow-y:auto;padding:0 8px 12px}
.queue::-webkit-scrollbar{width:2px}
.queue::-webkit-scrollbar-thumb{background:var(--glass-b);border-radius:2px}
.qi{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:1px}
.qi:hover{background:var(--glass-hover)}
.qi.on{background:var(--accent-dim)}
.qi img{width:40px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--glass)}
.qi-info{min-width:0;flex:1}
.qi-title{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qi-fav{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:3px;transition:color .15s;line-height:1}
.qi-fav.active{color:var(--fav)}
.qi-fav:hover{color:var(--fav)}
.played-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:0.5px solid var(--glass-b);background:rgba(6,4,15,0.5);flex-shrink:0}
.algo-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:11.5px;background:var(--glass);border:0.5px solid var(--glass-b);color:var(--muted);cursor:pointer;transition:all .2s}
.pill.on{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:0.5px solid var(--glass-b);border-radius:8px;color:var(--muted);font-size:15px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s}
.icon-btn:hover{color:var(--text)}

/* Stage */
.stage{flex:1;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
#ytp{width:100%;height:100%;display:none}
.art-view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.art-img{width:200px;height:200px;border-radius:18px;object-fit:cover;border:0.5px solid var(--glass-b)}
.art-title{margin-top:22px;font-size:18px;font-weight:500;text-align:center;max-width:400px;line-height:1.3}
.art-ch{margin-top:6px;font-size:13px;color:var(--muted)}
.art-eq{display:flex;align-items:flex-end;gap:3px;height:20px;margin-top:14px}
.eq-bar{width:3px;border-radius:2px;background:var(--accent);animation:eq .7s ease-in-out infinite alternate}
.eq-bar:nth-child(2){animation-delay:.1s;height:60%}
.eq-bar:nth-child(3){animation-delay:.2s;height:90%}
.eq-bar:nth-child(4){animation-delay:.05s;height:40%}
.eq-bar:nth-child(5){animation-delay:.15s;height:75%}
@keyframes eq{from{transform:scaleY(0.3)}to{transform:scaleY(1)}}
.eq-stopped .eq-bar{animation:none;transform:scaleY(0.3)}
.vid-bottom{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(6,4,15,0.9));padding:28px 24px 0;pointer-events:none}
.vid-title-overlay{font-size:16px;font-weight:500}
.vid-ch-overlay{font-size:12px;color:var(--muted);margin-top:3px}
.empty-hint{text-align:center}
.empty-hint i{font-size:44px;color:var(--muted);opacity:0.35;display:block;margin-bottom:12px}
.empty-hint p{font-size:13px;color:var(--muted)}
.spinner{width:36px;height:36px;border:2px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stage-fav{position:absolute;top:16px;right:16px;background:rgba(6,4,15,0.6);border:0.5px solid var(--glass-b);border-radius:50%;width:38px;height:38px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;transition:color .2s;z-index:10}
.stage-fav.show{display:flex}
.stage-fav.active{color:var(--fav)}
.stage-fav:hover{color:var(--fav)}

/* Player bar */
.pbar{flex-shrink:0;padding:12px 22px 16px;background:rgba(6,4,15,0.8);border-top:0.5px solid var(--glass-b)}
.prog-wrap{margin-bottom:11px;cursor:pointer;padding:4px 0}
.prog-bg{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;position:relative}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s linear;position:relative;min-width:0}
.prog-fill::after{content:'';position:absolute;right:-5px;top:-4px;width:11px;height:11px;border-radius:50%;background:var(--accent)}
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-center{display:flex;align-items:center;gap:14px}
.c-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:19px;padding:4px;transition:color .15s;display:flex;align-items:center}
.c-btn:hover{color:var(--text)}
.c-btn.active{color:var(--accent)}
.play-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;font-size:17px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
.play-btn:hover{opacity:0.82}
.time-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:90px}
.time-lbl.right{text-align:right}
.vol-row{display:flex;align-items:center;gap:8px;min-width:130px;justify-content:flex-end}
.vol-row i{color:var(--muted);font-size:15px}
input[type=range].vol{width:76px;height:3px;accent-color:var(--accent);cursor:pointer}

/* Toast */
.toast{position:fixed;top:16px;right:18px;z-index:999;background:rgba(20,14,40,0.97);border:0.5px solid var(--glass-b);border-radius:10px;padding:9px 16px;font-size:12px;color:var(--text);animation:toastIn 2.8s forwards;pointer-events:none}
@keyframes toastIn{0%{opacity:0;transform:translateY(-6px)}12%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0}}

/* Modal */
.modal-wrap{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,4,15,0.85);align-items:center;justify-content:center}
.modal-wrap.show{display:flex}
.modal{background:rgba(18,12,36,0.98);border:0.5px solid var(--glass-b);border-radius:14px;padding:24px 22px;width:340px}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px}
.modal input{width:100%;background:var(--glass);border:0.5px solid var(--glass-b);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.mbtn.cancel{border:0.5px solid var(--glass-b);background:transparent;color:var(--muted)}
.mbtn.save{border:0.5px solid var(--accent-border);background:var(--accent-dim);color:var(--accent)}

/* Fav panel */
.fav-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:300px;z-index:150;background:rgba(10,6,24,0.97);border-left:0.5px solid var(--glass-b);flex-direction:column;overflow:hidden}
.fav-panel.show{display:flex}
.fav-header{padding:18px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--glass-b)}
.fav-header h3{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.fav-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.fav-list{flex:1;overflow-y:auto;padding:8px}
.fav-list::-webkit-scrollbar{width:2px}
.fav-list::-webkit-scrollbar-thumb{background:var(--glass-b);border-radius:2px}
.fav-empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8}
</style>
</head>
<body>

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo"><span class="logo-mark">◈</span><span class="logo-name">Auris</span></div>

    <div class="search-row">
      <div class="sbox">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input id="si" type="text" placeholder="Search music or videos…" />
      </div>
    </div>

    <div class="mode-row">
      <button class="mtab on" id="tm" onclick="setMode('music')">Music</button>
      <button class="mtab" id="tv" onclick="setMode('video')">Video</button>
    </div>

    <div class="section-label">
      <span id="qlabel">Queue</span>
      <span class="clr" onclick="clearQueue()">Clear</span>
    </div>
    <div class="queue" id="queue">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:10px">
        <i class="ti ti-music" style="font-size:32px;color:var(--muted);opacity:.3" aria-hidden="true"></i>
        <span style="font-size:12px;color:var(--muted)">Search to discover music</span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div class="algo-pills" id="pills">
        <span class="pill on" onclick="applyFilter(this,'')">All</span>
        <span class="pill" onclick="applyFilter(this,'recent')">Recent</span>
        <span class="pill" onclick="applyFilter(this,'discover')">Discover</span>
        <span class="pill" onclick="applyFilter(this,'trending')">Trending</span>
        <span class="pill" onclick="applyFilter(this,'favourites')"><i class="ti ti-heart" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>Favourites</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="showFavPanel()" title="Favourites" aria-label="Favourites"><i class="ti ti-heart"></i></button>
        <button class="icon-btn" onclick="showModal()" title="API key" aria-label="API key"><i class="ti ti-key"></i></button>
      </div>
    </div>

    <div class="stage" id="stage">
      <div id="ytp"></div>
      <div class="art-view" id="artView">
        <div id="stateEl">
          <div class="empty-hint">
            <i class="ti ti-player-play" aria-hidden="true"></i>
            <p>Search and pick a track to play</p>
          </div>
        </div>
      </div>
      <div class="vid-bottom" id="vidBottom" style="display:none">
        <div class="vid-title-overlay" id="vTitle"></div>
        <div class="vid-ch-overlay" id="vCh"></div>
        <div style="height:80px"></div>
      </div>
      <button class="stage-fav" id="stageFav" onclick="toggleFavCurrent()" aria-label="Favourite">
        <i class="ti ti-heart" id="stageFavIco"></i>
      </button>
    </div>

    <div class="pbar">
      <div class="prog-wrap" id="progWrap" onclick="seek(event)">
        <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <div class="ctrl-row">
        <div class="time-lbl" id="tLeft">0:00</div>
        <div class="ctrl-center">
          <button class="c-btn" onclick="prev()" aria-label="Previous"><i class="ti ti-player-skip-back"></i></button>
          <button class="c-btn" onclick="doShuffle()" aria-label="Shuffle"><i class="ti ti-arrows-shuffle"></i></button>
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <i class="ti ti-player-play" id="playIco"></i>
          </button>
          <button class="c-btn" id="loopBtn" onclick="toggleLoop()" title="Loop current track"><i class="ti ti-repeat-once"></i></button>
          <button class="c-btn" id="repBtn" onclick="toggleRepeat()" title="Repeat all"><i class="ti ti-repeat"></i></button>
          <button class="c-btn" onclick="next()" aria-label="Next"><i class="ti ti-player-skip-forward"></i></button>
        </div>
        <div class="vol-row">
          <i class="ti ti-volume" aria-hidden="true"></i>
          <input type="range" class="vol" id="vol" min="0" max="100" value="80" step="1" oninput="setVol(this.value)" />
          <div class="time-lbl right" id="tRight">0:00</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Fav panel -->
<div class="fav-panel" id="favPanel">
  <div class="fav-header">
    <h3><i class="ti ti-heart" style="color:var(--fav)" aria-hidden="true"></i>Favourites</h3>
    <button class="fav-close" onclick="hideFavPanel()" aria-label="Close"><i class="ti ti-x"></i></button>
  </div>
  <div class="fav-list" id="favList"></div>
</div>

<!-- Key modal -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h3>YouTube API key</h3>
    <input id="ki" type="text" placeholder="AIza…" />
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveKey()">Save</button>
    </div>
  </div>
</div>

<script>
let API='AIzaSyDKe_ow-JDTqxhGUsYFeXSdCbtNWT8pR7E';
let mode='music',tracks=[],idx=-1,player=null,ready=false,piv=null;
let filter='',loopOn=false,repeatOn=false,playing=false;
let history=[],terms=[],favs=[];
try{history=JSON.parse(localStorage.getItem('auris_h')||'[]');}catch(e){}
try{terms=JSON.parse(localStorage.getItem('auris_t')||'[]');}catch(e){}
try{favs=JSON.parse(localStorage.getItem('auris_f')||'[]');}catch(e){}

window.onYouTubeIframeAPIReady=()=>{
  player=new YT.Player('ytp',{
    height:'100%',width:'100%',
    playerVars:{autoplay:0,controls:0,modestbranding:1,rel:0,iv_load_policy:3,showinfo:0,fs:0,playsinline:1},
    events:{
      onReady:()=>{ready=true;player.setVolume(80);},
      onStateChange:(e)=>{
        if(e.data===1){startProg();setPlayIco(true);playing=true;updateEq(true);}
        if(e.data===2){stopProg();setPlayIco(false);playing=false;updateEq(false);}
        if(e.data===0){
          if(loopOn){player.seekTo(0);player.playVideo();}
          else next();
        }
      }
    }
  });
};
(()=>{const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();

function setMode(m){
  mode=m;
  document.getElementById('tm').classList.toggle('on',m==='music');
  document.getElementById('tv').classList.toggle('on',m==='video');
  document.getElementById('qlabel').textContent=m==='music'?'Queue':'Results';
  const q=document.getElementById('si').value.trim();
  if(q) doSearch(q);
}

function buildQ(base){
  let q=base||'';
  if(!q){
    const pool=[...terms.slice(-6),...history.slice(-6).map(h=>h.ch)].filter(Boolean);
    q=pool.length?pool[Math.floor(Math.random()*pool.length)]:(mode==='music'?'top music 2024':'popular videos 2024');
  }
  if(mode==='music'&&!/music|song|official|audio/i.test(q)) q+=' music';
  if(filter==='trending') q+=' trending 2024';
  if(filter==='discover') q+=' hidden gem underground';
  return q;
}

async function doSearch(base){
  const raw=base||document.getElementById('si').value.trim();
  const q=buildQ(raw);
  if(raw&&!terms.includes(raw)){terms.push(raw);terms=terms.slice(-30);try{localStorage.setItem('auris_t',JSON.stringify(terms));}catch(e){}}
  setStage('loading');
  const cat=mode==='music'?'&videoCategoryId=10':'';
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video${cat}&maxResults=25&key=${API}`);
    const d=await r.json();
    if(d.error){toast('API: '+d.error.message);setStage('empty');return;}
    tracks=(d.items||[]).filter(i=>i.id&&i.id.videoId).map(i=>({
      id:i.id.videoId,title:i.snippet.title,ch:i.snippet.channelTitle,
      thumb:i.snippet.thumbnails?.default?.url||''
    }));
    smartSort();renderQ();
    if(idx<0) setStage('empty');
  }catch(e){toast('Network error');setStage('empty');}
}

function smartSort(){
  const hids=new Set(history.map(h=>h.id));
  const hchs=history.map(h=>h.ch);
  tracks.sort((a,b)=>{
    let sa=hchs.filter(c=>c===a.ch).length+(hids.has(a.id)?0.5:0);
    let sb=hchs.filter(c=>c===b.ch).length+(hids.has(b.id)?0.5:0);
    return sb-sa;
  });
}

function renderQ(){
  const el=document.getElementById('queue');
  if(!tracks.length){el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:40px 0;gap:8px"><i class="ti ti-mood-empty" style="font-size:28px;color:var(--muted);opacity:.3"></i><span style="font-size:12px;color:var(--muted)">No results</span></div>';return;}
  el.innerHTML=tracks.map((t,i)=>`
    <div class="qi${i===idx?' on':''}" onclick="play(${i})">
      <img src="${t.thumb}" alt="" onerror="this.style.display='none'"/>
      <div class="qi-info">
        <div class="qi-title">${esc(t.title)}</div>
        <div class="qi-sub">${esc(t.ch)}</div>
      </div>
      <div class="qi-actions" onclick="event.stopPropagation()">
        <button class="qi-fav${isFav(t.id)?' active':''}" onclick="toggleFav(${i})" aria-label="Favourite"><i class="ti ti-heart"></i></button>
      </div>
      ${history.some(h=>h.id===t.id)?'<div class="played-dot"></div>':''}
    </div>`).join('');
}

function play(i){
  if(!ready){toast('Player loading…');return;}
  idx=i;const t=tracks[i];
  addHistory(t);renderQ();updateStageFav();
  if(mode==='video'){
    document.getElementById('ytp').style.display='block';
    document.getElementById('artView').style.display='none';
    document.getElementById('vidBottom').style.display='block';
    document.getElementById('vTitle').textContent=t.title;
    document.getElementById('vCh').textContent=t.ch;
  } else {
    document.getElementById('ytp').style.display='none';
    document.getElementById('artView').style.display='flex';
    document.getElementById('vidBottom').style.display='none';
    setStage('art',t);
  }
  document.getElementById('stageFav').classList.add('show');
  player.loadVideoById(t.id);player.playVideo();
}

function setStage(state,t){
  const av=document.getElementById('artView');
  const se=document.getElementById('stateEl');
  av.style.display='flex';
  if(state==='loading'){se.innerHTML='<div class="spinner"></div>';}
  else if(state==='empty'){se.innerHTML='<div class="empty-hint"><i class="ti ti-player-play"></i><p>Search and pick a track to play</p></div>';}
  else if(state==='art'&&t){
    se.innerHTML=`<div style="text-align:center">
      <img src="${t.thumb.replace('default','hqdefault')}" class="art-img" alt="" onerror="this.style.display='none'"/>
      <div class="art-title">${esc(t.title)}</div>
      <div class="art-ch">${esc(t.ch)}</div>
      <div class="art-eq" id="eq">
        <div class="eq-bar" style="height:35%"></div>
        <div class="eq-bar" style="height:60%"></div>
        <div class="eq-bar" style="height:90%"></div>
        <div class="eq-bar" style="height:40%"></div>
        <div class="eq-bar" style="height:75%"></div>
      </div></div>`;
  }
}

function updateEq(p){const eq=document.getElementById('eq');if(!eq)return;eq.classList.toggle('eq-stopped',!p);}

function addHistory(t){
  history=history.filter(h=>h.id!==t.id);history.push(t);history=history.slice(-60);
  try{localStorage.setItem('auris_h',JSON.stringify(history));}catch(e){}
}

/* Favourites */
function isFav(id){return favs.some(f=>f.id===id);}

function toggleFav(i){
  const t=tracks[i];
  if(isFav(t.id)){favs=favs.filter(f=>f.id!==t.id);toast('Removed from favourites');}
  else{favs.push(t);toast('Added to favourites ♥');}
  saveFavs();renderQ();updateStageFav();renderFavPanel();
}

function toggleFavCurrent(){if(idx>=0&&tracks[idx]) toggleFav(idx);}

function updateStageFav(){
  if(idx<0||!tracks[idx])return;
  const btn=document.getElementById('stageFav');
  const active=isFav(tracks[idx].id);
  btn.classList.toggle('active',active);
  document.getElementById('stageFavIco').className=active?'ti ti-heart-filled':'ti ti-heart';
}

function saveFavs(){try{localStorage.setItem('auris_f',JSON.stringify(favs));}catch(e){}}

function showFavPanel(){renderFavPanel();document.getElementById('favPanel').classList.add('show');}
function hideFavPanel(){document.getElementById('favPanel').classList.remove('show');}

function renderFavPanel(){
  const el=document.getElementById('favList');
  if(!favs.length){el.innerHTML='<div class="fav-empty">No favourites yet.<br>Tap ♥ on any track.</div>';return;}
  el.innerHTML=favs.map((t,i)=>`
    <div class="qi" onclick="playFav(${i})">
      <img src="${t.thumb}" alt="" onerror="this.style.display='none'"/>
      <div class="qi-info">
        <div class="qi-title">${esc(t.title)}</div>
        <div class="qi-sub">${esc(t.ch)}</div>
      </div>
      <div class="qi-actions" onclick="event.stopPropagation()">
        <button class="qi-fav active" onclick="removeFav(${i})" aria-label="Remove"><i class="ti ti-heart"></i></button>
      </div>
    </div>`).join('');
}

function playFav(i){
  const t=favs[i];
  const qi=tracks.findIndex(tr=>tr.id===t.id);
  if(qi>=0){play(qi);hideFavPanel();return;}
  tracks.unshift(t);renderQ();play(0);hideFavPanel();
}

function removeFav(i){
  favs.splice(i,1);saveFavs();renderFavPanel();renderQ();updateStageFav();
  toast('Removed from favourites');
}

/* Playback */
function togglePlay(){if(!ready||idx<0)return;const s=player.getPlayerState();if(s===1)player.pauseVideo();else player.playVideo();}
function next(){if(tracks.length)play((idx+1)%tracks.length);}
function prev(){if(tracks.length)play((idx-1+tracks.length)%tracks.length);}
function doShuffle(){if(tracks.length)play(Math.floor(Math.random()*tracks.length));}

function toggleLoop(){
  loopOn=!loopOn;if(loopOn)repeatOn=false;
  document.getElementById('loopBtn').classList.toggle('active',loopOn);
  document.getElementById('repBtn').classList.toggle('active',false);
  toast(loopOn?'Loop on: repeating current track':'Loop off');
}

function toggleRepeat(){
  repeatOn=!repeatOn;if(repeatOn)loopOn=false;
  document.getElementById('repBtn').classList.toggle('active',repeatOn);
  document.getElementById('loopBtn').classList.toggle('active',false);
  toast(repeatOn?'Repeat all on':'Repeat all off');
}

function setVol(v){if(ready)player.setVolume(parseInt(v));}

function seek(e){
  if(!ready||idx<0)return;
  const r=e.currentTarget.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  const d=player.getDuration();if(d)player.seekTo(p*d,true);
}

function startProg(){
  stopProg();
  piv=setInterval(()=>{
    if(!ready)return;
    const c=player.getCurrentTime()||0,d=player.getDuration()||1;
    document.getElementById('progFill').style.width=(c/d*100)+'%';
    document.getElementById('tLeft').textContent=fmt(c);
    document.getElementById('tRight').textContent=fmt(d);
  },500);
}
function stopProg(){clearInterval(piv);}
function fmt(s){s=Math.floor(s);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function setPlayIco(p){document.getElementById('playIco').className=p?'ti ti-player-pause':'ti ti-player-play';}

function applyFilter(el,f){
  filter=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  if(f==='recent'&&history.length){tracks=[...history].reverse();renderQ();return;}
  if(f==='favourites'){tracks=[...favs];renderQ();return;}
  const q=document.getElementById('si').value.trim();
  doSearch(q||null);
}

function clearQueue(){tracks=[];idx=-1;renderQ();setStage('empty');document.getElementById('stageFav').classList.remove('show');}

function showModal(){document.getElementById('ki').value=API;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function saveKey(){API=document.getElementById('ki').value.trim();closeModal();toast('API key saved');}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')next();
  if(e.code==='ArrowLeft')prev();
});

setTimeout(()=>{if(history.length||terms.length)doSearch();},700);
</script>
</body>
</html>
